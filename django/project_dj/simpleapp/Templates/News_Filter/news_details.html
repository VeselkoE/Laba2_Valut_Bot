{% extends "News_Filter/default.html" %}

{% load censor_filters %}

{% block title %}{{ news.title|censor }}{% endblock %}

{% block content %}
    <h2>{{ news.title|censor }}</h2>
    <p><em>{{ news.date_pub|date:"d.m.Y" }}</em></p>
    <p>{{ news.text|censor }}</p>

    <a href="{% url 'task19:new_list_by_pages' %}">Назад к новостям</a>
{% endblock %}
