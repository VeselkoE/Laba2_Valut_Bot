{% extends "News/default.html" %}

{% load censor_filters %}

{% block title %}{{ news.title|censor }}{% endblock %}

{% block content %}
    <h2>{{ news.title|censor }}</h2>
    <p><em>{{ news.date_pub|date:"d.m.Y" }}</em></p>
    <p>{{ news.text|censor }}</p>
    <p>{{ news.post_type|title }}</p>
    <a href="{% url 'task18:news_list' %}">Назад к новостям</a>
{% endblock %}
